<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jobmania Wiki</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <nav>
            <!-- Logo -->
            <img src="https://raw.githubusercontent.com/noagrp/j/refs/heads/main/jobmania_official_icon.png" 
                 alt="Jobmania Logo" class="nav-logo">

            <!-- Language Selector -->
            <select id="langSelect" onchange="changeLanguage(this.value)">
                <option value="English">🇬🇧 English</option>
                <option value="Chinese">🇨🇳 中文 (简体)</option>
                <option value="Chinese (Traditional)">🇹🇼 中文 (繁體)</option>
                <option value="Japanese">🇯🇵 日本語</option>
            </select>

            <!-- Game Info -->
            <div class="game-info">
                <strong>Jobmania - Eternal Dungeon</strong><br>
                AUBJECTIVE TECHNOLOGY LTD.<br>
                Contains ads • In-app purchases
            </div>

            <hr>

            <!-- Main Navigation -->
            <div class="menu-item" onclick="loadView('Home')">🏠 Home</div>
            <div class="menu-item" onclick="loadView('Monsters')">👹 Characters</div>
            <div class="menu-item" onclick="loadView('Jobs')">⚔️ Jobs</div>
            <div class="menu-item" onclick="loadView('Abilities')">✨ Abilities</div>
            <div class="menu-item" onclick="loadView('Passives')">🛡️ Passives</div>

            <hr>

            <!-- External Links -->
            <a href="https://play.google.com/store/apps/details?id=com.aubjective.jobmania&hl=en" 
               target="_blank" class="menu-link">▶️ Google Play</a>
            <a href="https://discord.gg/6U5FNFVrwb" 
               target="_blank" class="menu-link">💬 Join Discord</a>
        </nav>

        <main id="content">
            <h1>Loading Wiki Data...</h1>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
